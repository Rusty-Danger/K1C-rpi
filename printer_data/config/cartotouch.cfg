#[scanner]
#is_non_critical: true           # flag this as non critical
#serial: /dev/serial/by-id/usb-Cartographer_614e_27002100114330394D363620-if00
#sensor: cartographer
#backlash_comp: 0.5
#mesh_runs: 2
#mesh_main_direction: x
#x_offset: -24.0
#y_offset: 0.0
#scanner_touch_max_temp: 150
#scanner_touch_max_retries: 20
#scanner_touch_sample_count: 3
#scanner_touch_retract_dist: 5
#scanner_touch_retract_speed: 10

[temperature_sensor cartographer_mcu]
sensor_type: temperature_mcu
sensor_mcu: scanner
min_temp: 0
max_temp: 105

[bed_mesh]
horizontal_move_z: 5
speed: 300
mesh_min: 10,10
mesh_max: 200,198
probe_count: 40,40
algorithm: bicubic
bicubic_tension: 0.1
zero_reference_position: 114,113

[screws_tilt_adjust]
screw1: 48,20
screw1_name: front left screw
screw2: 218,20
screw2_name: front right screw
screw3: 218,190
screw3_name: rear right screw
screw4: 48,190
screw4_name: rear left screw
speed: 50
horizontal_move_z: 5
screw_thread: CW-M4

[axis_twist_compensation]
speed: 50
horizontal_move_z: 5
calibrate_start_x: 10
calibrate_end_x: 200
calibrate_y: 105

